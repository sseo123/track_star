<!doctype html>
<html>
  <head>
    <title>Shawn Seo's Running Playlist</title>
    <meta
      name="description"
      content="Let your music set the pace as your run"
    />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Running Playlist</h1>
    </header>

    <div class="pace-selector">
      <label>What is your target pace per mile?</label>
      <h3>Input your desired pace (between 5 mins and 12 mins)</h3>
      <div class="timer-input-container">
        <div class="input-unit">
          <span class="label-text">min</span>
          <input
            type="number"
            id="pace-min"
            placeholder="00"
            min="5"
            max="12"
          />
        </div>
        <span class="separator">:</span>
        <div class="input-unit">
          <span class="label-text">sec</span>
          <input
            type="number"
            id="pace-sec"
            placeholder="00"
            min="0"
            max="59"
          />
        </div>
      </div>

      <div id="bpm-result-box" style="display: none">
        Your target is <span id="bpm-display"></span> BPM
      </div>
      <div id="bpm-negative-result-box" style="display: none">Invalid time</div>
    </div>

    <div class="footer">
      <button onclick="generatePlaylistAlert()">Generate Playlist</button>
      <button onclick="manuallyCreatePlaylistAlert()">
        Manually Create Playlist
      </button>
    </div>
  </body>
</html>
